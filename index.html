<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sust-Ansias Sin Filtro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // TUS CLAVES REALES
        const firebaseConfig = {
            apiKey: "AIzaSyAeYRFbSnUUcqyB5_aUQuKHcurDIrU6204",
            authDomain: "el-arbol-2026.firebaseapp.com",
            projectId: "el-arbol-2026",
            storageBucket: "el-arbol-2026.firebasestorage.app",
            messagingSenderId: "899394834604",
            appId: "1:899394834604:web:16585c60a0402987494f09"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fs = { collection, addDoc, onSnapshot, query, orderBy };
        signInAnonymously(window.auth);
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function PieChart({ data, title }) {
            const total = data.reduce((a, b) => a + b.value, 0);
            let offset = 0;
            const colors = ['#15a892', '#5c3a21', '#fbbf24', '#ef4444', '#3b82f6', '#ec4899', '#8b5cf6', '#10b981', '#f97316', '#64748b'];
            
            return (
                <div className="bg-white p-4 rounded-xl shadow-sm my-4 border">
                    <h3 className="font-bold text-[#15a892] mb-4 text-center">{title}</h3>
                    <div className="flex justify-center">
                        <svg width="150" height="150" viewBox="-1 -1 2 2" className="rotate-[-90deg]">
                            {data.map((slice, i) => {
                                if (total === 0 || slice.value === 0) return null;
                                const angle = (slice.value / total) * 2 * Math.PI;
                                const x1 = Math.cos(offset);
                                const y1 = Math.sin(offset);
                                offset += angle;
                                const x2 = Math.cos(offset);
                                const y2 = Math.sin(offset);
                                return <path key={i} d={`M 0 0 L ${x1} ${y1} A 1 1 0 ${angle > Math.PI ? 1 : 0} 1 ${x2} ${y2} Z`} fill={colors[i % colors.length]} />;
                            })}
                        </svg>
                    </div>
                    <div className="mt-4 grid grid-cols-1 gap-2">
                        {data.map((s, i) => s.value > 0 && <div key={i} className="text-xs flex justify-between"><span>{s.label}</span><span className="font-bold">{total ? Math.round((s.value/total)*100) : 0}%</span></div>)}
                    </div>
                </div>
            );
        }

        function App() {
            const [showIntro, setShowIntro] = useState(true);
            const [activeTab, setActiveTab] = useState('survey');
            const [surveyAnswers, setSurveyAnswers] = useState([]);
            const [formData, setFormData] = useState({ q1: '', q2: '', q3: '', q4: '' });
            const [submitted, setSubmitted] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [pass, setPass] = useState('');

            useEffect(() => {
                const timer = setTimeout(() => setShowIntro(false), 3000);
                const q = window.fs.query(window.fs.collection(window.db, 'survey_v3'), window.fs.orderBy('timestamp', 'desc'));
                window.fs.onSnapshot(q, (snap) => {
                    const data = [];
                    snap.forEach(d => data.push(d.data().answers));
                    setSurveyAnswers(data);
                });
                return () => clearTimeout(timer);
            }, []);

            if (showIntro) return <div className="h-screen flex items-center justify-center bg-white"><img src="INTRO.jpeg" className="w-full max-w-sm" /></div>;

            const submit = async () => {
                if(!formData.q2 || !formData.q3 || !formData.q4) return alert("Por favor, completa todas las opciones.");
                await window.fs.addDoc(window.fs.collection(window.db, 'survey_v3'), { answers: formData, timestamp: Date.now() });
                setSubmitted(true);
            };

            const getCount = (q, opt) => surveyAnswers.filter(a => a[q] === opt).length;

            return (
                <div className="max-w-md mx-auto p-4 pb-24 bg-gray-50 min-h-screen">
                    <header className="text-center mb-6"><h1 className="text-2xl font-black text-[#15a892]">SUST-ANSIAS</h1><h2 className="font-bold text-[#5c3a21]">SIN FILTRO</h2></header>
                    
                    {activeTab === 'survey' ? (
                        submitted ? <div className="text-center p-10 font-bold text-[#15a892] bg-white rounded-2xl border">¡Gracias por participar!</div> :
                        <div className="space-y-6">
                            <label className="block font-bold">1. ¿Qué experiencias han tenido respecto al consumo de sustancias?</label>
                            <textarea className="w-full border p-3 rounded-xl" onChange={e => setFormData({...formData, q1: e.target.value})}></textarea>
                            
                            <label className="block font-bold">2. Si consumen / consumieron algún tipo de sustancia, ¿consideran que tienen dependencia a esa sustancia?</label>
                            {['SÍ', 'NO', 'HE TENIDO DEPENDENCIA ALGUNA VEZ', 'NUNCA LO HE PENSADO'].map(o => <button key={o} onClick={() => setFormData({...formData, q2: o})} className={`block w-full p-2 border-2 rounded-lg my-1 ${formData.q2 === o ? 'bg-[#15a892] text-white border-[#15a892]' : 'bg-white'}`}>{o}</button>)}

                            <label className="block font-bold">3. ¿Cuánto tiempo de uso de pantalla les figura en el celular?</label>
                            <select className="w-full p-3 border-2 rounded-lg" onChange={e => setFormData({...formData, q3: e.target.value})}>
                                <option value="">Selecciona horas...</option>
                                {Array.from({length:15},(_,i)=>i+1).map(i=><option key={i} value={i+' HORAS'}>{i} HORAS</option>)}
                            </select>
                            
                            <label className="block font-bold">4. ¿A qué edad consideran brindarle un dispositivo digital a sus hijos?</label>
                            <select className="w-full p-3 border-2 rounded-lg" onChange={e => setFormData({...formData, q4: e.target.value})}>
                                <option value="">Selecciona edad...</option>
                                {Array.from({length:18},(_,i)=>i+1).map(i=><option key={i} value={i+' AÑOS'}>{i} AÑOS</option>)}
                            </select>

                            <button onClick={submit} className="w-full py-4 bg-[#15a892] text-white font-bold rounded-xl mt-4 shadow-lg">ENVIAR ENCUESTA</button>
                        </div>
                    ) : (
                        !isAdmin ? <div className="space-y-4 bg-white p-6 rounded-2xl border"><input type="password" placeholder="Contraseña ADM" onChange={e=>setPass(e.target.value)} className="w-full p-3 border rounded-xl" /><button onClick={()=>pass==='ARBOL26' && setIsAdmin(true)} className="w-full bg-[#5c3a21] text-white p-3 rounded-xl font-bold">INGRESAR</button></div> :
                        <div className="pb-10">
                            <h2 className="font-bold text-xl mb-4">1. Experiencias de consumo:</h2>
                            <div className="bg-white p-4 rounded-xl border mb-6 max-h-60 overflow-y-auto">{surveyAnswers.map((a,i)=><p key={i} className="border-b p-2 text-sm">{a.q1}</p>)}</div>
                            <PieChart title="2. ¿Tienes dependencia?" data={['SÍ', 'NO', 'HE TENIDO DEPENDENCIA ALGUNA VEZ', 'NUNCA LO HE PENSADO'].map((o)=>({label:o, value:getCount('q2',o)}))} />
                            <PieChart title="3. Tiempo de pantalla" data={Array.from({length:15},(_,i)=>i+1+' HORAS').map((o)=>({label:o, value:getCount('q3',o)}))} />
                            <PieChart title="4. Edad dispositivo hijos" data={Array.from({length:18},(_,i)=>i+1+' AÑOS').map((o)=>({label:o, value:getCount('q4',o)}))} />
                        </div>
                    )}
                    
                    <nav className="fixed bottom-0 left-0 w-full bg-white p-4 flex justify-around border-t shadow-lg z-50">
                        <button onClick={() => setActiveTab('survey')} className={`font-bold ${activeTab==='survey'?'text-[#15a892]':'text-gray-400'}`}>PREGUNTAS</button>
                        <button onClick={() => setActiveTab('admin')} className={`font-bold ${activeTab==='admin'?'text-[#5c3a21]':'text-gray-400'}`}>ADM</button>
                    </nav>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
