<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sust-Ansias Sin Filtro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAeYRFbSnUUcqyB5_aUQuKHcurDIrU6204",
            authDomain: "el-arbol-2026.firebaseapp.com",
            projectId: "el-arbol-2026",
            storageBucket: "el-arbol-2026.firebasestorage.app",
            messagingSenderId: "899394834604",
            appId: "1:899394834604:web:16585c60a0402987494f09"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.auth = getAuth(app);
        window.fs = { collection, addDoc, onSnapshot };
        signInAnonymously(window.auth);
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [showIntro, setShowIntro] = useState(true);
            const [activeTab, setActiveTab] = useState('survey');
            const [surveyAnswers, setSurveyAnswers] = useState([]);
            const [formData, setFormData] = useState({ q1: '', q2: '', q3: '', q4: '' });
            const [submitted, setSubmitted] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [pass, setPass] = useState('');

            useEffect(() => {
                setTimeout(() => setShowIntro(false), 3000);
                window.fs.onSnapshot(window.fs.collection(window.db, 'survey_v2'), (snap) => {
                    const data = [];
                    snap.forEach(d => data.push(d.data().answers));
                    setSurveyAnswers(data);
                });
            }, []);

            if (showIntro) return <div className="h-screen flex items-center justify-center bg-white"><img src="INTRO.jpeg" className="w-full max-w-sm" /></div>;

            const submit = async () => {
                await window.fs.addDoc(window.fs.collection(window.db, 'survey_v2'), { answers: formData, timestamp: Date.now() });
                setSubmitted(true);
            };

            const getCount = (q, opt) => surveyAnswers.filter(a => a[q] === opt).length;

            return (
                <div className="max-w-md mx-auto p-4 pb-20">
                    <header className="text-center mb-6"><h1 className="text-2xl font-black text-[#15a892]">SUST-ANSIAS SIN FILTRO</h1></header>
                    
                    {activeTab === 'survey' ? (
                        submitted ? <div className="text-center p-10 font-bold text-[#15a892]">¡Gracias por participar!</div> :
                        <div className="space-y-4">
                            <label className="block font-bold">1. Experiencias:</label>
                            <textarea className="w-full border p-2 rounded" onChange={e => setFormData({...formData, q1: e.target.value})}></textarea>
                            
                            <label className="block font-bold">2. ¿Consideras que tienes dependencia?</label>
                            {['SÍ', 'NO', 'HE TENIDO DEPENDENCIA ALGUNA VEZ', 'NUNCA LO HE PENSADO'].map(o => <button key={o} onClick={() => setFormData({...formData, q2: o})} className={`block w-full p-2 border my-1 ${formData.q2 === o ? 'bg-[#15a892] text-white' : ''}`}>{o}</button>)}

                            <label className="block font-bold">3. Tiempo de pantalla:</label>
                            {['+ de 2hs', '+ de 3hs', '+ de 5 hs', '+ de 6hs', '+ mas de 7hs', '+ de 9hs', '+ 10hs', '+ de 10hs', '+ de 14hs'].map(o => <button key={o} onClick={() => setFormData({...formData, q3: o})} className={`block w-full p-2 border my-1 ${formData.q3 === o ? 'bg-[#15a892] text-white' : ''}`}>{o}</button>)}
                            
                            <label className="block font-bold">4. Edad brindarle dispositivo (1-18 años):</label>
                            <select className="w-full p-2 border" onChange={e => setFormData({...formData, q4: e.target.value})}>{Array.from({length:18},(_,i)=>i+1).map(i=><option key={i} value={i+' AÑO'}>{i} AÑO</option>)}</select>

                            <button onClick={submit} className="w-full py-4 bg-[#15a892] text-white font-bold rounded-xl mt-4">ENVIAR</button>
                        </div>
                    ) : (
                        !isAdmin ? <div className="space-y-4"><input type="password" onChange={e=>setPass(e.target.value)} className="w-full p-2 border" /><button onClick={()=>pass==='ARBOL26' && setIsAdmin(true)} className="w-full bg-[#5c3a21] text-white p-2">INGRESAR</button></div> :
                        <div>
                            <h2 className="font-bold">Respuestas Q1:</h2>{surveyAnswers.map((a,i)=><p key={i} className="border-b p-1">{a.q1}</p>)}
                            {['q2','q3','q4'].map(q => <div key={q} className="my-4 p-4 bg-gray-100"><h3 className="font-bold">{q}</h3>{['Opcion1','Opcion2'].map(o=><p key={o}>{o}: {getCount(q,o)}</p>)}</div>)}
                        </div>
                    )}
                    
                    <nav className="fixed bottom-0 w-full bg-white p-4 flex justify-around border-t">
                        <button onClick={() => setActiveTab('survey')} className="font-bold">PREGUNTAS</button>
                        <button onClick={() => setActiveTab('admin')} className="font-bold">ADM</button>
                    </nav>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
