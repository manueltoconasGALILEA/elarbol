<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sust-Ansias Sin Filtro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans pb-24">
    <!-- CABECERA -->
    <header class="bg-white shadow-sm sticky top-0 z-10 rounded-b-3xl">
        <div class="max-w-md mx-auto px-4 py-4 flex flex-col items-center">
            <img src="logo.jpg" alt="Logo" class="h-20 w-auto mb-2" onerror="this.style.display='none'">
            <h1 class="text-xl font-black text-[#15a892] tracking-wide text-center uppercase leading-tight">
                Sust-Ansias<br><span class="text-[#5c3a21]">Sin Filtro</span>
            </h1>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <!-- SECCIÓN 1: FOTOS -->
        <div id="tab-photos" class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm text-center border border-teal-50">
                <h2 class="text-lg font-bold mb-2">¡Captura el momento!</h2>
                <input type="file" accept="image/*" id="fileInput" class="hidden">
                <button onclick="document.getElementById('fileInput').click()" class="w-full py-4 px-4 rounded-xl font-bold text-white bg-[#15a892] shadow-lg active:bg-teal-700">
                    Sacar o Subir Foto
                </button>
                <p id="upload-status" class="text-sm mt-3 font-bold text-[#15a892] hidden">Subiendo foto a la nube...</p>
            </div>
            <div id="photos-grid" class="grid grid-cols-2 gap-3">
                <!-- Las fotos aparecerán aquí -->
            </div>
        </div>

        <!-- SECCIÓN 2: ENCUESTA -->
        <div id="tab-survey" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-teal-50" id="survey-form-container">
                <h2 class="text-xl font-bold text-[#15a892] mb-4">Preguntas de la Radio</h2>
                
                <label class="block font-bold mb-1 text-sm text-[#5c3a21]">1. ¿Qué experiencias han tenido respecto al consumo de sust-ansias?</label>
                <textarea id="q1" class="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 mb-4" rows="2"></textarea>

                <label class="block font-bold mb-1 text-sm text-[#5c3a21]">2. Si consumen / consumieron, ¿consideran que tienen dependencia a esa sust-ansia?</label>
                <textarea id="q2" class="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 mb-4" rows="2"></textarea>

                <label class="block font-bold mb-1 text-sm text-[#5c3a21]">3. ¿Cuánto tiempo de uso de pantalla les figura en el celular?</label>
                <textarea id="q3" class="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 mb-4" rows="2"></textarea>

                <label class="block font-bold mb-1 text-sm text-[#5c3a21]">4. ¿A qué edad consideran brindarle un dispositivo digital a sus hijos?</label>
                <textarea id="q4" class="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 mb-6" rows="2"></textarea>

                <button id="submit-survey" class="w-full py-4 rounded-2xl font-bold text-white bg-[#15a892] shadow-lg">Enviar Respuestas</button>
            </div>
            <div id="survey-success" class="hidden bg-white p-8 rounded-3xl text-center shadow-sm border-2 border-green-400">
                <h2 class="text-2xl font-bold text-green-500 mb-2">¡Guardado!</h2>
                <p>Las respuestas se leerán en vivo.</p>
                <button onclick="location.reload()" class="mt-4 text-[#15a892] font-bold underline">Enviar otra respuesta</button>
            </div>
        </div>

        <!-- SECCIÓN 3: ADM -->
        <div id="tab-admin" class="hidden space-y-6">
            <div id="admin-login" class="bg-white p-8 rounded-3xl shadow-sm text-center">
                <h2 class="text-xl font-bold mb-4">Área de Lectura (Radio)</h2>
                <input type="password" id="admin-pass" placeholder="Ingresa la contraseña" class="w-full p-3 rounded-xl border border-gray-200 mb-4 text-center">
                <button id="btn-login" class="w-full py-3 rounded-xl font-bold text-white bg-[#5c3a21]">Ingresar</button>
            </div>
            <div id="admin-content" class="hidden space-y-4">
                <div class="bg-[#15a892] p-4 rounded-xl text-white font-bold text-center">Respuestas Recibidas en Vivo</div>
                <div id="answers-list" class="space-y-4">
                    <!-- Respuestas de la gente -->
                </div>
            </div>
        </div>
    </main>

    <!-- BARRA INFERIOR (BOTONES) -->
    <nav class="bg-white border-t border-gray-100 fixed bottom-0 w-full z-20 flex justify-around p-3 pb-6">
        <button onclick="showTab('photos')" id="btn-tab-photos" class="font-bold text-[#15a892]">📸 Fotos</button>
        <button onclick="showTab('survey')" id="btn-tab-survey" class="font-bold text-gray-400">📝 Preguntas</button>
        <button onclick="showTab('admin')" id="btn-tab-admin" class="font-bold text-gray-400">🔒 ADM</button>
    </nav>

    <!-- EL MOTOR DE LA APLICACIÓN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // TUS CLAVES EXACTAS (NO TOCAR)
        const firebaseConfig = {
            apiKey: "AIzaSyAeYRFbSnUUcqyB5_aUQuKHcurDIrU6204",
            authDomain: "el-arbol-2026.firebaseapp.com",
            projectId: "el-arbol-2026",
            storageBucket: "el-arbol-2026.firebasestorage.app",
            messagingSenderId: "899394834604",
            appId: "1:899394834604:web:16585c60a0402987494f09"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        signInAnonymously(auth).catch(error => {
            alert("Para que lleguen los datos: Ve a Firebase -> Autenticación -> Pestaña 'Sign-in method' -> Activa 'Anónimo'.");
        });

        // Cambiar pestañas
        window.showTab = (tabId) => {
            document.getElementById('tab-photos').style.display = tabId === 'photos' ? 'block' : 'none';
            document.getElementById('tab-survey').style.display = tabId === 'survey' ? 'block' : 'none';
            document.getElementById('tab-admin').style.display = tabId === 'admin' ? 'block' : 'none';
            
            document.getElementById('btn-tab-photos').className = tabId === 'photos' ? 'font-bold text-[#15a892]' : 'font-bold text-gray-400';
            document.getElementById('btn-tab-survey').className = tabId === 'survey' ? 'font-bold text-[#15a892]' : 'font-bold text-gray-400';
            document.getElementById('btn-tab-admin').className = tabId === 'admin' ? 'font-bold text-[#5c3a21]' : 'font-bold text-gray-400';
        };

        // Enviar Encuesta
        document.getElementById('submit-survey').addEventListener('click', async () => {
            const btn = document.getElementById('submit-survey');
            btn.innerText = "Enviando...";
            const ans = {
                q1: document.getElementById('q1').value,
                q2: document.getElementById('q2').value,
                q3: document.getElementById('q3').value,
                q4: document.getElementById('q4').value
            };
            try {
                await addDoc(collection(db, 'survey'), { answers: ans, timestamp: Date.now() });
                document.getElementById('survey-form-container').style.display = 'none';
                document.getElementById('survey-success').style.display = 'block';
            } catch(e) {
                alert("Activa los permisos en la base de datos de Firebase.");
                btn.innerText = "Enviar Respuestas";
            }
        });

        // Entrar a ADM
        document.getElementById('btn-login').addEventListener('click', () => {
            if(document.getElementById('admin-pass').value === 'ARBOL26') {
                document.getElementById('admin-login').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            } else {
                alert('Contraseña incorrecta');
            }
        });

        // Cargar respuestas de ADM en vivo
        onSnapshot(collection(db, 'survey'), (snap) => {
            const list = document.getElementById('answers-list');
            list.innerHTML = '';
            const allDocs = [];
            snap.forEach(doc => allDocs.push(doc.data()));
            allDocs.sort((a, b) => b.timestamp - a.timestamp); // Mas nuevas arriba

            allDocs.forEach(dataObj => {
                const data = dataObj.answers;
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-xl shadow-sm border-l-4 border-[#15a892] text-sm';
                div.innerHTML = `
                    ${data.q1 ? `<p class="mb-2"><b class="text-[#15a892]">1.</b> ${data.q1}</p>` : ''}
                    ${data.q2 ? `<p class="mb-2"><b class="text-[#15a892]">2.</b> ${data.q2}</p>` : ''}
                    ${data.q3 ? `<p class="mb-2"><b class="text-[#15a892]">3.</b> ${data.q3}</p>` : ''}
                    ${data.q4 ? `<p><b class="text-[#15a892]">4.</b> ${data.q4}</p>` : ''}
                `;
                list.appendChild(div);
            });
        });

        // Subir y mostrar Fotos
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('upload-status').style.display = 'block';
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const scale = img.width > 600 ? 600 / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    try {
                        await addDoc(collection(db, 'photos'), { url: canvas.toDataURL('image/jpeg', 0.6), timestamp: Date.now() });
                    } catch(err) {}
                    document.getElementById('upload-status').style.display = 'none';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        onSnapshot(collection(db, 'photos'), (snap) => {
            const grid = document.getElementById('photos-grid');
            grid.innerHTML = '';
            const allPhotos = [];
            snap.forEach(doc => allPhotos.push(doc.data()));
            allPhotos.sort((a, b) => b.timestamp - a.timestamp);
            allPhotos.forEach(p => {
                const div = document.createElement('div');
                div.className = 'aspect-square bg-gray-200 rounded-2xl overflow-hidden';
                div.innerHTML = `<img src="${p.url}" class="w-full h-full object-cover">`;
                grid.appendChild(div);
            });
        });
    </script>
</body>
</html>
