<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sust-Ansias Sin Filtro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 antialiased text-gray-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAeYRFbSnUUcqyB5_aUQuKHcurDIrU6204",
            authDomain: "el-arbol-2026.firebaseapp.com",
            projectId: "el-arbol-2026",
            storageBucket: "el-arbol-2026.firebasestorage.app",
            messagingSenderId: "899394834604",
            appId: "1:899394834604:web:16585c60a0402987494f09"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.firebaseAPI = { auth, db, signInAnonymously, onAuthStateChanged, collection, addDoc, onSnapshot, query, orderBy };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('survey');
            const [showIntro, setShowIntro] = useState(true);
            const [surveyAnswers, setSurveyAnswers] = useState([]);
            const [messages, setMessages] = useState([]);
            const [msgInput, setMsgInput] = useState('');
            const [isAdmin, setIsAdmin] = useState(false);
            const [pass, setPass] = useState('');

            useEffect(() => {
                // Intro de 3 segundos
                setTimeout(() => setShowIntro(false), 3000);
                const fb = window.firebaseAPI;
                fb.signInAnonymously(fb.auth);

                const q = fb.query(fb.collection(fb.db, 'survey_v3'), fb.orderBy('timestamp', 'desc'));
                fb.onSnapshot(q, (snap) => {
                    const data = [];
                    snap.forEach(d => data.push(d.data()));
                    setSurveyAnswers(data);
                });

                const qMsg = fb.query(fb.collection(fb.db, 'messages_v3'), fb.orderBy('timestamp', 'desc'));
                fb.onSnapshot(qMsg, (snap) => {
                    const data = [];
                    snap.forEach(d => data.push(d.data()));
                    setMessages(data);
                });
            }, []);

            const sendMsg = async () => {
                if(!msgInput.trim()) return;
                await window.firebaseAPI.addDoc(window.firebaseAPI.collection(window.firebaseAPI.db, 'messages_v3'), { text: msgInput, timestamp: Date.now() });
                setMsgInput('');
            };

            const PieChart = ({ data, title }) => {
                const total = data.reduce((a, b) => a + b.value, 0);
                let offset = 0;
                const colors = ['#15a892', '#5c3a21', '#fbbf24', '#ef4444', '#3b82f6', '#ec4899', '#8b5cf6'];
                return (
                    <div className="bg-white p-6 rounded-3xl shadow-sm border mb-6">
                        <h3 className="font-bold text-[#15a892] mb-4 text-center">{title}</h3>
                        <div className="flex justify-center"><svg width="150" height="150" viewBox="-1 -1 2 2" className="rotate-[-90deg]">{data.map((s, i) => { if(total===0 || s.value===0) return null; const angle=(s.value/total)*2*Math.PI; const x1=Math.cos(offset), y1=Math.sin(offset); offset+=angle; const x2=Math.cos(offset), y2=Math.sin(offset); return <path key={i} d={`M 0 0 L ${x1} ${y1} A 1 1 0 ${angle>Math.PI?1:0} 1 ${x2} ${y2} Z`} fill={colors[i%colors.length]} />;})}</svg></div>
                        <div className="mt-4 grid grid-cols-1 gap-2">{data.map((s, i) => s.value > 0 && <div key={i} className="text-xs flex items-center justify-between"><div className="flex items-center gap-2"><span className="w-3 h-3 rounded-full" style={{backgroundColor: colors[i%colors.length]}}></span><span>{s.label}</span></div><span className="font-bold">{total ? Math.round((s.value/total)*100) : 0}%</span></div>)}</div>
                    </div>
                );
            };

            if (showIntro) return <div className="h-screen flex items-center justify-center bg-white"><img src="INTRO.jpeg" className="w-full max-w-sm" /></div>;

            return (
                <div className="max-w-md mx-auto p-4 pb-28 bg-gray-50 min-h-screen">
                    <header className="text-center mb-6"><h1 className="text-2xl font-black text-[#15a892]">SUST-ANSIAS</h1><h2 className="font-bold text-[#5c3a21]">SIN FILTRO</h2></header>
                    
                    {activeTab === 'survey' && <SurveyForm />}
                    {activeTab === 'msg' && (
                        <div className="space-y-4">
                            <h2 className="font-bold text-center mb-4">Interacción abierta</h2>
                            <textarea value={msgInput} onChange={e=>setMsgInput(e.target.value)} className="w-full p-4 rounded-xl border" placeholder="Deja tu comentario..."></textarea>
                            <button onClick={sendMsg} className="w-full py-3 bg-[#15a892] text-white font-bold rounded-xl">Enviar Mensaje</button>
                            {messages.map((m,i)=><div key={i} className="bg-white p-3 rounded-lg border text-sm shadow-sm">{m.text}</div>)}
                        </div>
                    )}
                    {activeTab === 'admin' && (
                        !isAdmin ? <div className="space-y-4 bg-white p-6 rounded-2xl border"><input type="password" placeholder="Contraseña ADM" onChange={e=>setPass(e.target.value)} className="w-full p-3 border rounded-xl" /><button onClick={()=>pass==='ARBOL26' && setIsAdmin(true)} className="w-full bg-[#5c3a21] text-white p-3 rounded-xl font-bold">INGRESAR</button></div> :
                        <div className="pb-10">
                            <div className="bg-white p-6 rounded-3xl shadow-sm border mb-6 text-center"><h3 className="text-gray-500 font-bold">TOTAL DE ENCUESTADOS</h3><div className="text-5xl font-black text-[#15a892]">{surveyAnswers.length}</div></div>
                            <h2 className="font-bold text-xl mb-4 text-[#5c3a21]">1. Experiencias:</h2>
                            <div className="bg-white p-4 rounded-xl border mb-6 max-h-60 overflow-y-auto">{surveyAnswers.map((a,i)=><p key={i} className="border-b p-2 text-sm">{a.answers.q1}</p>)}</div>
                            <PieChart title="2. ¿Tienes dependencia?" data={['SÍ', 'NO', 'HE TENIDO DEPENDENCIA ALGUNA VEZ', 'NUNCA LO HE PENSADO'].map(o=>({label:o, value:surveyAnswers.filter(a=>a.answers.q2===o).length}))} />
                            <PieChart title="3. Tiempo de pantalla" data={Array.from({length:15},(_,i)=>i+1+' HORAS').map(o=>({label:o, value:surveyAnswers.filter(a=>a.answers.q3===o).length}))} />
                            <PieChart title="4. Edad dispositivo hijos" data={Array.from({length:18},(_,i)=>i+1+' AÑOS').map(o=>({label:o, value:surveyAnswers.filter(a=>a.answers.q4===o).length}))} />
                        </div>
                    )}
                    
                    <nav className="fixed bottom-0 left-0 w-full bg-white p-4 flex justify-around border-t z-50">
                        <button onClick={() => setActiveTab('survey')} className={`font-bold ${activeTab==='survey'?'text-[#15a892]':'text-gray-400'}`}>PREGUNTAS</button>
                        <button onClick={() => setActiveTab('msg')} className={`font-bold ${activeTab==='msg'?'text-[#15a892]':'text-gray-400'}`}>MENSAJES</button>
                        <button onClick={() => setActiveTab('admin')} className={`font-bold ${activeTab==='admin'?'text-[#5c3a21]':'text-gray-400'}`}>ADM</button>
                    </nav>
                </div>
            );
        }

        function SurveyForm() {
            const [formData, setFormData] = useState({ q1: '', q2: '', q3: '', q4: '' });
            const [submitted, setSubmitted] = useState(false);
            const submit = async () => {
                if(!formData.q1 || !formData.q2 || !formData.q3 || !formData.q4) return alert("Completa todas las preguntas.");
                await window.firebaseAPI.addDoc(window.firebaseAPI.collection(window.firebaseAPI.db, 'survey_v3'), { answers: formData, timestamp: Date.now() });
                setSubmitted(true);
            };
            if(submitted) return <div className="text-center p-10 font-bold text-[#15a892] bg-white rounded-2xl border">¡Gracias por participar!</div>;
            return (
                <div className="space-y-6">
                    <label className="block font-bold">1. ¿Qué experiencias han tenido respecto al consumo de sustancias?</label>
                    <textarea className="w-full border p-3 rounded-xl" onChange={e => setFormData({...formData, q1: e.target.value})}></textarea>
                    <label className="block font-bold">2. Si consumen / consumieron algún tipo de sustancia, ¿consideran que tienen dependencia a esa sustancia?</label>
                    {['SÍ', 'NO', 'HE TENIDO DEPENDENCIA ALGUNA VEZ', 'NUNCA LO HE PENSADO'].map(o => <button key={o} onClick={() => setFormData({...formData, q2: o})} className={`block w-full p-2 border-2 rounded-lg my-1 ${formData.q2 === o ? 'bg-[#15a892] text-white border-[#15a892]' : 'bg-white'}`}>{o}</button>)}
                    <label className="block font-bold">3. ¿Cuánto tiempo de uso de pantalla les figura en el celular?</label>
                    <select className="w-full p-3 border-2 rounded-lg" onChange={e => setFormData({...formData, q3: e.target.value})}><option value="">Selecciona horas...</option>{Array.from({length:15},(_,i)=>i+1).map(i=><option key={i} value={i+' HORAS'}>{i} HORAS</option>)}</select>
                    <label className="block font-bold">4. ¿A qué edad consideran brindarle un dispositivo digital a sus hijos?</label>
                    <select className="w-full p-3 border-2 rounded-lg" onChange={e => setFormData({...formData, q4: e.target.value})}><option value="">Selecciona edad...</option>{Array.from({length:18},(_,i)=>i+1).map(i=><option key={i} value={i+' AÑOS'}>{i} AÑOS</option>)}</select>
                    <button onClick={submit} className="w-full py-4 bg-[#15a892] text-white font-bold rounded-xl mt-4 shadow-lg">ENVIAR ENCUESTA</button>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
