<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sust-Ansias Sin Filtro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div id="app" class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-lg">
        <h1 class="text-xl font-bold text-center mb-4">Cargando aplicación...</h1>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
  apiKey: "AIzaSyAeYRFbSnUUcqyB5_aUQukHcurDirU62O4",
  authDomain: "el-arbol-2026.firebaseapp.com",
  projectId: "el-arbol-2026",
  storageBucket: "el-arbol-2026.firebasestorage.app",
  messagingSenderId: "899394834604",
  appId: "1:899394834604:web:16585c60a0402987494f09"
};

        // ----------------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        signInAnonymously(auth).then(() => {
            document.getElementById('app').innerHTML = `
                <h1 class="text-xl font-bold text-center text-[#15a892] mb-4">Sust-Ansias Funciona</h1>
                <p class="text-center text-green-600 font-bold">¡La conexión es correcta!</p>
            `;
        }).catch(e => {
            document.getElementById('app').innerHTML = `<p class="text-red-500">Error: ${e.message}</p>`;
        });
    </script>
</body>
</html>
